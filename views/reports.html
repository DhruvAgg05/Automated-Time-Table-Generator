<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reports | Automated Time Table Management System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/public/css/style.css">
</head>
<body data-page="reports">
  <div class="container-fluid page-shell">
    <div class="row">
      <div class="col-lg-2 sidebar p-3 no-print">
        <h4 class="fw-bold mb-4">ATMS</h4>
        <nav class="nav flex-column">
          <a class="nav-link" href="/dashboard">Dashboard</a>
          <a class="nav-link" href="/teachers">Teachers</a>
          <a class="nav-link" href="/students">Students</a>
          <a class="nav-link" href="/subjects">Subjects</a>
          <a class="nav-link" href="/classrooms">Classrooms</a>
          <a class="nav-link" href="/timetable">Timetable</a>
          <a class="nav-link active" href="/reports">Reports</a>
          <a class="nav-link" href="/profile">Profile</a>
        </nav>
      </div>
      <div class="col-lg-10 content-wrap">
        <div class="module-header no-print">
          <div>
            <span class="section-pill">Reports Center</span>
            <h1 class="page-title mb-1 mt-2">Reports and Printable Export</h1>
            <p class="page-subtitle"><span id="currentUserName"></span> | <span id="currentUserRole"></span></p>
          </div>
          <button class="btn btn-outline-danger" id="logoutBtn">Logout</button>
        </div>

        <div class="card panel-card mb-4 no-print">
          <div class="card-body d-flex flex-wrap gap-2">
            <button class="btn btn-primary" id="teacherWorkloadBtn">Generate Teacher Workload</button>
            <button class="btn btn-outline-primary" id="roomAllocationBtn">Generate Room Allocation</button>
            <button class="btn btn-outline-secondary" id="summaryReportBtn">Generate Summary Report</button>
            <button class="btn btn-outline-dark" id="printReportBtn">Print Report</button>
          </div>
        </div>

        <div class="row g-4">
          <div class="col-lg-8">
            <div class="card panel-card">
              <div class="card-body">
                <h5 class="mb-3">Generated Report Output</h5>
                <div id="reportsMeta" class="mb-3"></div>
                <div id="reportsOutput"><p class="text-muted mb-0">Choose a report action to display data here.</p></div>
              </div>
            </div>
          </div>
          <div class="col-lg-4">
            <div class="card panel-card">
              <div class="card-body">
                <h5 class="mb-3">Saved Report History</h5>
                <ul class="list-group" id="savedReportsList"></ul>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/public/js/app.js"></script>
</body>
</html>
