<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teachers | Automated Time Table Management System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/public/css/style.css">
</head>
<body data-page="teachers">
  <div class="container-fluid page-shell">
    <div class="row">
      <div class="col-lg-2 sidebar p-3 no-print">
        <h4 class="fw-bold mb-4">ATMS</h4>
        <nav class="nav flex-column">
          <a class="nav-link" href="/dashboard">Dashboard</a>
          <a class="nav-link active" href="/teachers">Teachers</a>
          <a class="nav-link" href="/students">Students</a>
          <a class="nav-link" href="/subjects">Subjects</a>
          <a class="nav-link" href="/classrooms">Classrooms</a>
          <a class="nav-link" href="/timetable">Timetable</a>
          <a class="nav-link" href="/reports">Reports</a>
        </nav>
      </div>
      <div class="col-lg-10 content-wrap">
        <div class="d-flex justify-content-between align-items-center mb-4 no-print">
          <div>
            <h1 class="page-title mb-1">Teacher Management</h1>
            <p class="text-muted mb-0"><span id="currentUserName"></span> | <span id="currentUserRole"></span></p>
          </div>
          <button class="btn btn-outline-danger" id="logoutBtn">Logout</button>
        </div>
        <div id="teacherMessage"></div>
        <div class="row g-4">
          <div class="col-lg-5">
            <div class="card panel-card">
              <div class="card-body">
                <h5 class="mb-3">Add / Edit Teacher</h5>
                <form id="teacherForm">
                  <input type="hidden" name="id">
                  <div class="row g-3">
                    <div class="col-md-6"><input class="form-control" name="teacher_code" placeholder="Teacher Code" required></div>
                    <div class="col-md-6"><input class="form-control" name="full_name" placeholder="Full Name" required></div>
                    <div class="col-md-6"><input class="form-control" name="email" type="email" placeholder="Email" required></div>
                    <div class="col-md-6"><input class="form-control" name="phone" placeholder="Phone"></div>
                    <div class="col-md-6"><select class="form-select" id="teacherDepartment" name="department_id" required></select></div>
                    <div class="col-md-6"><input class="form-control" name="designation" placeholder="Designation" required></div>
                    <div class="col-md-6"><input class="form-control" name="max_lectures_per_day" type="number" min="1" max="6" value="5" required></div>
                  </div>
                  <button class="btn btn-primary mt-3">Save Teacher</button>
                </form>
              </div>
            </div>
            <div class="card panel-card mt-4">
              <div class="card-body">
                <h5 class="mb-3">Teacher Availability</h5>
                <form id="availabilityForm">
                  <div class="mb-3">
                    <select class="form-select" id="availabilityTeacherId" required></select>
                  </div>
                  <div class="table-responsive">
                    <table class="table table-bordered text-center align-middle">
                      <thead><tr><th>Day</th><th>1</th><th>2</th><th>3</th><th>4</th><th>5</th><th>6</th></tr></thead>
                      <tbody>
                        <tr><th>Monday</th><td><input type="checkbox" id="av-Monday-1"></td><td><input type="checkbox" id="av-Monday-2"></td><td><input type="checkbox" id="av-Monday-3"></td><td><input type="checkbox" id="av-Monday-4"></td><td><input type="checkbox" id="av-Monday-5"></td><td><input type="checkbox" id="av-Monday-6"></td></tr>
                        <tr><th>Tuesday</th><td><input type="checkbox" id="av-Tuesday-1"></td><td><input type="checkbox" id="av-Tuesday-2"></td><td><input type="checkbox" id="av-Tuesday-3"></td><td><input type="checkbox" id="av-Tuesday-4"></td><td><input type="checkbox" id="av-Tuesday-5"></td><td><input type="checkbox" id="av-Tuesday-6"></td></tr>
                        <tr><th>Wednesday</th><td><input type="checkbox" id="av-Wednesday-1"></td><td><input type="checkbox" id="av-Wednesday-2"></td><td><input type="checkbox" id="av-Wednesday-3"></td><td><input type="checkbox" id="av-Wednesday-4"></td><td><input type="checkbox" id="av-Wednesday-5"></td><td><input type="checkbox" id="av-Wednesday-6"></td></tr>
                        <tr><th>Thursday</th><td><input type="checkbox" id="av-Thursday-1"></td><td><input type="checkbox" id="av-Thursday-2"></td><td><input type="checkbox" id="av-Thursday-3"></td><td><input type="checkbox" id="av-Thursday-4"></td><td><input type="checkbox" id="av-Thursday-5"></td><td><input type="checkbox" id="av-Thursday-6"></td></tr>
                        <tr><th>Friday</th><td><input type="checkbox" id="av-Friday-1"></td><td><input type="checkbox" id="av-Friday-2"></td><td><input type="checkbox" id="av-Friday-3"></td><td><input type="checkbox" id="av-Friday-4"></td><td><input type="checkbox" id="av-Friday-5"></td><td><input type="checkbox" id="av-Friday-6"></td></tr>
                        <tr><th>Saturday</th><td><input type="checkbox" id="av-Saturday-1"></td><td><input type="checkbox" id="av-Saturday-2"></td><td><input type="checkbox" id="av-Saturday-3"></td><td><input type="checkbox" id="av-Saturday-4"></td><td><input type="checkbox" id="av-Saturday-5"></td><td><input type="checkbox" id="av-Saturday-6"></td></tr>
                      </tbody>
                    </table>
                  </div>
                  <button class="btn btn-outline-primary">Save Availability</button>
                </form>
              </div>
            </div>
          </div>
          <div class="col-lg-7">
            <div class="card panel-card">
              <div class="card-body">
                <div class="d-flex justify-content-between align-items-center mb-3">
                  <h5 class="mb-0">Teacher List</h5>
                  <input class="form-control w-auto" id="teacherSearch" placeholder="Search teachers">
                </div>
                <div class="table-responsive">
                  <table class="table data-table" id="teachersTable">
                    <thead><tr><th>Code</th><th>Name</th><th>Department</th><th>Designation</th><th>Email</th><th>Max/Day</th><th>Action</th></tr></thead>
                    <tbody id="teachersRows"></tbody>
                  </table>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="/public/js/app.js"></script>
</body>
</html>
