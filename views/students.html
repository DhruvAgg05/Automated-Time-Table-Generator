<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Students | Automated Time Table Management System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/public/css/style.css">
</head>
<body data-page="students">
  <div class="container-fluid page-shell">
    <div class="row">
      <div class="col-lg-2 sidebar p-3 no-print">
        <h4 class="fw-bold mb-4">ATMS</h4>
        <nav class="nav flex-column">
          <a class="nav-link" href="/dashboard">Dashboard</a>
          <a class="nav-link" href="/teachers">Teachers</a>
          <a class="nav-link active" href="/students">Students</a>
          <a class="nav-link" href="/subjects">Subjects</a>
          <a class="nav-link" href="/classrooms">Classrooms</a>
          <a class="nav-link" href="/timetable">Timetable</a>
          <a class="nav-link" href="/reports">Reports</a>
        </nav>
      </div>
      <div class="col-lg-10 content-wrap">
        <div class="module-header no-print">
          <div>
            <span class="section-pill">Student Records</span>
            <h1 class="page-title mb-1 mt-2">Student Management</h1>
            <p class="page-subtitle"><span id="currentUserName"></span> | <span id="currentUserRole"></span></p>
          </div>
          <button class="btn btn-outline-danger" id="logoutBtn">Logout</button>
        </div>
        <div id="studentMessage"></div>
        <div class="row g-4">
          <div class="col-lg-4">
            <div class="card panel-card">
              <div class="card-body">
                <h5 class="mb-3">Add / Edit Student</h5>
                <form id="studentForm">
                  <input type="hidden" name="id">
                  <div class="row g-3">
                    <div class="col-12"><label class="form-label">Roll Number</label><input class="form-control" name="roll_number" placeholder="Roll Number" required></div>
                    <div class="col-12"><label class="form-label">Full Name</label><input class="form-control" name="full_name" placeholder="Full Name" required></div>
                    <div class="col-12"><label class="form-label">Email</label><input class="form-control" name="email" type="email" placeholder="Email" required></div>
                    <div class="col-12"><label class="form-label">Phone</label><input class="form-control" name="phone" placeholder="Phone"></div>
                    <div class="col-12"><label class="form-label">Department</label><select class="form-select" id="studentDepartment" name="department_id" required></select></div>
                    <div class="col-12"><label class="form-label">Class</label><select class="form-select" id="studentClass" name="class_id" required></select></div>
                    <div class="col-12"><label class="form-label">Section</label><select class="form-select" id="studentSection" name="section_id" required></select></div>
                  </div>
                  <button class="btn btn-primary mt-3">Save Student</button>
                </form>
              </div>
            </div>
            <div class="card panel-card upload-card mt-4">
              <div class="card-body">
                <h5 class="mb-2">Bulk Upload Students</h5>
                <p class="mini-note">Upload `.xlsx` or `.csv` for quick student entry.</p>
                <form id="studentUploadForm" class="action-stack">
                  <input class="form-control" type="file" name="file" accept=".xlsx,.csv" required>
                  <button class="btn btn-outline-primary">Upload File</button>
                  <a class="btn btn-outline-secondary" href="/api/students/template/download">Download Sample</a>
                </form>
              </div>
            </div>
          </div>
          <div class="col-lg-8">
            <div class="card panel-card">
              <div class="card-body">
                <div class="d-flex justify-content-between align-items-center mb-3">
                  <h5 class="mb-0">Student List</h5>
                  <input class="form-control w-auto" id="studentSearch" placeholder="Search students">
                </div>
                <div class="table-responsive">
                  <table class="table data-table" id="studentsTable">
                    <thead><tr><th>Roll No</th><th>Name</th><th>Department</th><th>Class</th><th>Section</th><th>Email</th><th>Action</th></tr></thead>
                    <tbody id="studentsRows"></tbody>
                  </table>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/public/js/app.js"></script>
</body>
</html>
