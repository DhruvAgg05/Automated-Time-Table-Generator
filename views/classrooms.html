<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Classrooms | Automated Time Table Management System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/public/css/style.css">
</head>
<body data-page="classrooms">
  <div class="container-fluid page-shell">
    <div class="row">
      <div class="col-lg-2 sidebar p-3 no-print">
        <h4 class="fw-bold mb-4">ATMS</h4>
        <nav class="nav flex-column">
          <a class="nav-link" href="/dashboard">Dashboard</a>
          <a class="nav-link" href="/teachers">Teachers</a>
          <a class="nav-link" href="/students">Students</a>
          <a class="nav-link" href="/subjects">Subjects</a>
          <a class="nav-link active" href="/classrooms">Classrooms</a>
          <a class="nav-link" href="/timetable">Timetable</a>
          <a class="nav-link" href="/reports">Reports</a>
        </nav>
      </div>
      <div class="col-lg-10 content-wrap">
        <div class="d-flex justify-content-between align-items-center mb-4 no-print">
          <div>
            <h1 class="page-title mb-1">Classroom and Lab Allocation</h1>
            <p class="text-muted mb-0"><span id="currentUserName"></span> | <span id="currentUserRole"></span></p>
          </div>
          <button class="btn btn-outline-danger" id="logoutBtn">Logout</button>
        </div>
        <div id="classroomMessage"></div>
        <div class="row g-4">
          <div class="col-lg-4">
            <div class="card panel-card">
              <div class="card-body">
                <h5 class="mb-3">Add / Edit Room</h5>
                <form id="classroomForm">
                  <input type="hidden" name="id">
                  <div class="mb-3"><input class="form-control" name="room_name" placeholder="Room Name" required></div>
                  <div class="mb-3"><select class="form-select" name="room_type"><option value="Classroom">Classroom</option><option value="Lab">Lab</option></select></div>
                  <div class="mb-3"><input class="form-control" name="capacity" type="number" min="1" placeholder="Capacity" required></div>
                  <div class="mb-3"><input class="form-control" name="building" placeholder="Building"></div>
                  <button class="btn btn-primary">Save Room</button>
                </form>
              </div>
            </div>
            <div class="card panel-card mt-4">
              <div class="card-body">
                <h5 class="mb-3">Room Usage Summary</h5>
                <ul class="list-group" id="roomUsageList"></ul>
              </div>
            </div>
          </div>
          <div class="col-lg-8">
            <div class="card panel-card">
              <div class="card-body">
                <div class="d-flex justify-content-between align-items-center mb-3">
                  <h5 class="mb-0">Classroom List</h5>
                  <input class="form-control w-auto" id="roomSearch" placeholder="Search rooms">
                </div>
                <div class="table-responsive">
                  <table class="table data-table" id="classroomsTable">
                    <thead><tr><th>Room</th><th>Type</th><th>Capacity</th><th>Building</th><th>Action</th></tr></thead>
                    <tbody id="classroomsRows"></tbody>
                  </table>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="/public/js/app.js"></script>
</body>
</html>
