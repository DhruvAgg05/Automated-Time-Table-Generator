<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timetable | Automated Time Table Management System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/public/css/style.css">
</head>
<body data-page="timetable">
  <div class="container-fluid page-shell">
    <div class="row">
      <div class="col-lg-2 sidebar p-3 no-print">
        <h4 class="fw-bold mb-4">ATMS</h4>
        <nav class="nav flex-column">
          <a class="nav-link" href="/dashboard">Dashboard</a>
          <a class="nav-link" href="/teachers" data-role-link="admin">Teachers</a>
          <a class="nav-link" href="/students" data-role-link="admin">Students</a>
          <a class="nav-link" href="/subjects" data-role-link="admin">Subjects</a>
          <a class="nav-link" href="/classrooms" data-role-link="admin">Classrooms</a>
          <a class="nav-link active" href="/timetable">Timetable</a>
          <a class="nav-link" href="/reports" data-role-link="admin">Reports</a>
        </nav>
      </div>
      <div class="col-lg-10 content-wrap">
        <div class="d-flex justify-content-between align-items-center mb-4 no-print">
          <div>
            <h1 class="page-title mb-1">Timetable Management</h1>
            <p class="text-muted mb-0"><span id="currentUserName"></span> | <span id="currentUserRole"></span></p>
          </div>
          <button class="btn btn-outline-danger" id="logoutBtn">Logout</button>
        </div>
        <div id="timetableMessage"></div>

        <div class="card panel-card mb-4 no-print">
          <div class="card-body d-flex flex-wrap gap-2">
            <button class="btn btn-primary" id="generateTimetableBtn">Generate Timetable Automatically</button>
            <button class="btn btn-outline-danger" id="clearTimetableBtn">Delete / Regenerate Timetable</button>
            <button class="btn btn-outline-secondary" id="printTimetableBtn">Print Timetable</button>
          </div>
        </div>

        <div class="row g-4">
          <div class="col-lg-8">
            <div class="card panel-card">
              <div class="card-body">
                <div class="d-flex justify-content-between align-items-center mb-3 no-print">
                  <h5 class="mb-0">Weekly Timetable Entries</h5>
                  <input class="form-control w-auto" id="timetableSearch" placeholder="Search timetable">
                </div>
                <div class="table-responsive">
                  <table class="table data-table" id="timetableTable">
                    <thead><tr><th>Class</th><th>Subject</th><th>Teacher</th><th>Room</th><th>Day</th><th>Slot</th><th>Mode</th><th class="no-print">Action</th></tr></thead>
                    <tbody id="timetableRows"></tbody>
                  </table>
                </div>
              </div>
            </div>
          </div>
          <div class="col-lg-4 no-print" id="manualOverridePanel">
            <div class="card panel-card mb-4">
              <div class="card-body">
                <h5 class="mb-3">Manual Override</h5>
                <form id="timetableEditForm">
                  <input type="hidden" id="editTimetableId" name="id">
                  <div class="mb-2"><select class="form-select" id="editClassId" name="class_id" required></select></div>
                  <div class="mb-2"><select class="form-select" id="editSectionId" name="section_id" required></select></div>
                  <div class="mb-2"><select class="form-select" id="editSubjectId" name="subject_id" required></select></div>
                  <div class="mb-2"><select class="form-select" id="editTeacherId" name="teacher_id" required></select></div>
                  <div class="mb-2"><select class="form-select" id="editClassroomId" name="classroom_id" required></select></div>
                  <div class="mb-2"><select class="form-select" id="editDay" name="day_of_week" required><option value="">Select Day</option><option>Monday</option><option>Tuesday</option><option>Wednesday</option><option>Thursday</option><option>Friday</option><option>Saturday</option></select></div>
                  <div class="mb-2"><select class="form-select" id="editSlot" name="slot_number" required><option value="">Select Slot</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option></select></div>
                  <div class="row g-2">
                    <div class="col-6"><input class="form-control" id="editStartTime" name="start_time" type="time" required></div>
                    <div class="col-6"><input class="form-control" id="editEndTime" name="end_time" type="time" required></div>
                  </div>
                  <button class="btn btn-outline-primary mt-3">Save Manual Edit</button>
                </form>
              </div>
            </div>
            <div class="card panel-card" id="sectionGridPanel">
              <div class="card-body">
                <h5 class="mb-3">View Section Grid</h5>
                <select class="form-select" id="sectionGridSelect"></select>
              </div>
            </div>
          </div>
        </div>

        <div class="card panel-card mt-4">
          <div class="card-body">
            <h5 class="mb-3">Printable Timetable Grid</h5>
            <div id="gridContainer"><p class="text-muted mb-0">Select a section to preview the weekly timetable grid.</p></div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="/public/js/app.js"></script>
</body>
</html>
